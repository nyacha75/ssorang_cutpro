<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🌊 [쏘랑] 다인 컷인 에디터 (심화 PRO+)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f7f9; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .container { display: flex; gap: 20px; width: 100%; max-width: 1550px; justify-content: center; align-items: flex-start; }
        .canvas-wrapper { display: flex; flex-direction: column; width: fit-content; position: sticky; top: 20px; }
        canvas { border: 2px solid #0055FF; border-radius: 4px; background: #fff; background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f0f0 75%), linear-gradient(-45deg, transparent 75%, #f0f0f0 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hint-box { font-size: 12px; color: #555; line-height: 1.6; margin-top: 10px; background: #fff; padding: 15px; border-radius: 6px; border: 1px solid #E8D8C8; }
        .control-panel { width: 420px; display: flex; flex-direction: column; gap: 15px; background: #fff; padding: 20px; border-radius: 8px; border: 2px solid #E8D8C8; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex-shrink: 0; }
        .control-group { border-bottom: 1px solid #E8D8C8; padding-bottom: 15px; }
        .control-group h3 { margin: 0 0 10px 0; font-size: 15px; color: #0055FF; }
        input, select { background: #fff; border: 1px solid #E8D8C8; padding: 7px; border-radius: 4px; font-size: 12px; outline: none; }
        input:focus { border-color: #0055FF; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
        .btn { background: #fff; color: #333; border: 1px solid #E8D8C8; flex: 1; padding: 8px 6px; font-size: 12px; cursor: pointer; border-radius: 4px; text-align: center; }
        .btn:hover { background: #F2E8DA; }
        .btn.hl { background: #F2E8DA; font-weight: bold; }
        .btn.magic { background: #0055FF; color: #fff; border-color: #0044CC; font-weight: bold; }
        .layer-list { max-height: 180px; overflow-y: auto; background: #f9f9f9; border: 1px solid #E8D8C8; border-radius: 4px; padding: 5px; }
        .layer-item { background: #fff; margin-bottom: 5px; padding: 8px; border-radius: 4px; border: 1px solid #E8D8C8; cursor: pointer; position: relative; }
        .layer-item.active { border-color: #0055FF; background: #F0F4FF; }
        .thumb { width: 25px; height: 25px; object-fit: contain; background: #fff; border-radius: 3px; border: 1px solid #ddd; }
        .l-btn { padding: 3px 6px; font-size: 10px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; background: #fff; }
        .l-btn.del { background: #ff4d4d; color: #fff; border: none; }
        .action-btn { border: none; padding: 14px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; color: #fff; margin-top: 10px; }
        #previewBtn { background: #E8D8C8; color: #333; } 
        #generateBtn { background: #0055FF; }
        .color-combo { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 3px; overflow: hidden; height: 22px; }
        .color-combo input[type="color"] { width: 22px; height: 22px; border: none; padding: 0; cursor: pointer; }
        .color-combo input[type="text"] { width: 50px; border: none; font-size: 10px; text-align: center; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="mainHeader" style="margin-bottom: 20px; text-align: center;">
        <h2 style="margin: 0 auto; background: #0055FF; color: #fff; font-family: 'Black Han Sans', sans-serif; font-weight: 400; padding: 10px 40px; border-radius: 4px; display: inline-block; font-size: 26px; letter-spacing: 1px;">🌊 [쏘랑] 다인 컷인 에디터 (심화 PRO+)</h2>
    </div>

    <div class="container">
        <div class="canvas-wrapper">
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:10px; font-weight:bold; font-size:12px; color:#0055FF; background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #0055FF;">
                <label><input type="radio" name="previewState" value="endMain" checked onchange="draw()"> 배치 완료</label>
                <label><input type="radio" name="previewState" value="postMain" onchange="draw()"> 표정 변경</label>
                <label><input type="radio" name="previewState" value="ending" onchange="draw()"> 엔딩 연출</label>
            </div>
            <canvas id="canvas" width="600" height="800"></canvas>
            <div class="hint-box">
                • <b>드래그</b>: 이동 | <b>모서리</b>: 크기 | <b>상단 동그라미</b>: 회전<br>
                • 7번 기능 사용 시 '표정 변경' 상태에서 이미지를 확인하세요.
            </div>
            <div style="background:#fff; border:1px solid #0055FF; padding:12px; border-radius:6px; margin-top:10px;">
                <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
                    <h3 style="margin:0; font-size:13px; color:#0044CC;">💾 백업 및 복원</h3>
                    <span id="autoSaveStatus" style="font-size:11px; color:#ff4d4d; font-weight:bold;"></span>
                </div>
                <div class="row">
                    <button class="btn" style="border-color:#0055FF; color:#0055FF;" onclick="saveProjectFile()">↓ 프로젝트 저장</button>
                    <button class="btn" style="border-color:#0055FF; color:#0055FF;" onclick="$('projectFileInput').click()">↑ 불러오기</button>
                    <input type="file" id="projectFileInput" accept=".json" style="display:none;" onchange="loadProjectFile(event)">
                </div>
            </div>
        </div>
        
        <div class="control-panel">
            <div class="control-group">
                <h3>1. 메인 이미지</h3>
                <div class="row"><input type="file" id="imageInput" multiple accept="image/*" style="flex:1;"></div>
            </div>
            
            <div class="control-group">
                <h3>2. 캔버스 및 레이아웃</h3>
                <div class="row" style="background:#f9f9f9; padding:5px; border-radius:4px;">
                    <input type="number" id="canvasW" value="600" style="width:50px;"> × <input type="number" id="canvasH" value="800" style="width:50px;">
                    <button class="btn hl" onclick="resizeCanvas()" style="padding:4px;">적용</button>
                    <button class="btn magic" onclick="act('quick')">✨ 자동 정렬</button>
                    <button class="btn magic" style="background:#ff7b00; border-color:#cc6200;" onclick="act('zigzag')">〰️ 지그재그</button>
                </div>
                <div style="text-align:center; margin: 5px 0;"><span onclick="toggleAdvAlign(this)" style="text-decoration:underline; cursor:pointer; font-size:11px; color:#555;">상세 조절 펼치기 ▼</span></div>
                <div id="advAlignWrapper" style="display:none; margin-top:5px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;">
                        <button class="btn hl" onclick="act('matchH')">📏 세로통일</button>
                        <button class="btn hl" onclick="act('matchW')">📏 가로통일</button>
                        <button class="btn hl" onclick="act('crop')">✂️ 캔버스맞춤</button>
                        <button class="btn" onclick="act('distH')">↔️ 가로정렬</button>
                        <button class="btn" onclick="act('distV')">↕️ 세로정렬</button>
                        <button class="btn hl" style="background:#e0edff; color:#0055ff;" onclick="act('center')">🎯 중앙정렬</button>
                    </div>
                    <div class="row" style="margin-top:8px; font-size:11px; justify-content:space-between; border-top:1px solid #eee; padding-top:8px;">
                        <span>이미지 간격: <input type="number" id="gap" value="20" style="width:35px;"> px</span>
                        <span>〰️ 지그재그 정도: <input type="number" id="zigzagOffset" value="15" style="width:35px;"> %</span>
                    </div>
                </div>
            </div>
            
            <div class="control-group" style="flex:1;">
                <h3>3. 레이어 리스트</h3>
                <div id="layerList" class="layer-list" style="max-height: 250px;"></div>
                <div class="row" style="margin-top:8px;">
                    <label style="font-size:11px;">추가 효과:</label>
                    <select id="globalEffect" onchange="draw(); triggerAutoSave();" style="flex:1; font-size:11px;">
                        <option value="none">효과 없음</option><option value="lines">1. 교차 빛나는 선</option><option value="trace">2. 이미지 테두리 빛 궤적</option><option value="trace_after">3. 종료 후 빛 궤적</option><option value="flash">4. 종료 후 번쩍</option>
                    </select>
                </div>
            </div>
            
            <div class="control-group" style="border-bottom:none;">
                <h3>4. 메인 타이포</h3>
                <div class="row"><input type="file" id="fontInput" multiple accept=".ttf,.otf,.woff,.woff2" style="flex:1;"></div>
                <div class="row">
                    <select id="globalFont" onchange="draw();" style="flex:1;"><option value="Black Han Sans">블랙한산스</option><option value="Jua">주아체</option></select>
                    <input type="number" id="gFontSize" value="60" style="width:40px;"> <span style="font-size:11px;">pt</span>
                </div>
                <div class="row" style="font-size:11px; gap:8px;">
                    <label><input type="checkbox" id="gVertical" onchange="draw();">세로쓰기</label>
                    <label><input type="checkbox" id="gShadow" checked onchange="draw();">그림자</label>
                    <label><input type="checkbox" id="gStroke" checked onchange="draw();">테두리</label>
                    <div class="color-combo"><input type="color" id="gStrokeColor" value="#000000" oninput="$('gStrokeHex').value=this.value; draw();"><input type="text" id="gStrokeHex" value="#000000" maxlength="7"></div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-group">
                <h3>5. 독립 레이어</h3>
                <div class="row">
                    <button class="btn" onclick="addExtraText()" style="border-color:#0055FF; color:#0055FF;">+ 타이포</button>
                    <button class="btn" onclick="$('extraImageInput').click()" style="border-color:#0055FF; color:#0055FF;">+ 이미지</button>
                    <input type="file" id="extraImageInput" multiple accept="image/*" style="display:none;">
                </div>
                <div id="extraLayerList" class="layer-list" style="margin-top:5px;"></div>
            </div>

            <div class="control-group">
                <h3>6. 시네마틱 엔딩 연출</h3>
                <div class="row" style="background:#fff4f4; padding:8px; border-radius:4px; border:1px solid #ffcdcc;">
                    <label style="font-weight:bold; color:#e60000; font-size:12px;"><input type="checkbox" id="endActive" onchange="toggleEndingUI(); draw();"> 🎬 엔딩 효과 켜기</label>
                </div>
                <div id="endingOptions" style="display:none; margin-top:8px;">
                    <div class="row" style="font-size:11px;">
                        투명도 <input type="number" id="endOpacity" value="30" style="width:35px;">%
                        효과 <select id="endEffect" onchange="draw();" style="flex:1;"><option value="slam">쾅하고 꽂히기</option><option value="fade">페이드인</option><option value="shake">흔들림</option><option value="split">중앙 가르기</option><option value="flash_appear">번쩍 등장</option></select>
                    </div>
                    <div class="row">
                        <button class="btn" onclick="addEndText()" style="font-size:10px;">+ 텍스트</button>
                        <button class="btn" onclick="$('endImageInput').click()" style="font-size:10px;">+ 이미지</button>
                        <button class="btn hl" onclick="actEnd('center')" style="font-size:10px;">🎯 중앙정렬</button>
                        <input type="file" id="endImageInput" multiple accept="image/*" style="display:none;">
                    </div>
                    <div id="endLayerList" class="layer-list" style="margin-top:5px;"></div>
                    <div style="background:#f9f9f9; padding:8px; border:1px solid #eee; margin-top:5px; font-size:11px;">
                        타이핑 <select id="endTypeSpeed" style="font-size:10px;"><option value="0">없음</option><option value="100" selected>기본</option></select>
                        폰트 <select id="endFont" style="font-size:10px; width:70px;"><option value="Black Han Sans">블랙한산스</option></select>
                        <label><input type="checkbox" id="endVertical" onchange="draw();">세로</label>
                        <label><input type="checkbox" id="endItalic" checked onchange="draw();">기울임</label>
                    </div>
                </div>
            </div>

            <div class="control-group" style="flex:1;">
                <h3>7. 애니메이션 종료 후 이미지 변경</h3>
                <div class="row" style="background:#f0f7ff; padding:8px; border-radius:4px; font-size:11px; justify-content:center; gap:10px;">
                    <label><input type="radio" name="effectOrder" value="postFirst" checked onchange="draw()"> 표정먼저</label>
                    <label><input type="radio" name="effectOrder" value="endFirst" onchange="draw()"> 엔딩먼저</label>
                </div>
                <div id="postLayerList" class="layer-list" style="max-height: 250px;"></div>
            </div>

            <div class="control-group" style="border-bottom:none;">
                <h3>8. 출력 파일 형식</h3>
                <div class="row">
                    <select id="quality" style="flex:1;"><option value="apng">APNG (코코포리아)</option><option value="gif">GIF (투명)</option><option value="mp4">MP4 (고화질)</option></select>
                </div>
                <div style="display:flex; gap:5px;"><button id="previewBtn" class="action-btn" style="flex:1;">▶ 재생</button><button id="generateBtn" class="action-btn" style="flex:1;">🎬 저장</button></div>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const canvasEl = $('canvas'), ctx = canvasEl.getContext('2d', { willReadFrequently: true });
        const offCanvas = document.createElement('canvas'), offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
        
        let layers = [], extraLayers = [], endLayers = [], customFonts = [];
        let sel = -1, selExtra = -1, selEnd = -1, isDrag = false, dragType = '', isPlay = false;
        let offX = 0, offY = 0, textRelX = 0, textRelY = 0, W = 600, H = 800;
        const ease = t => 1 - Math.pow(1 - t, 3);

        // --- 렌더링 시스템 ---
        function renderFrame(c, t, previewMode = false) {
            const dur = 2000, postDur = 1000, endDur = 2000;
            const isEndActive = $('endActive').checked;
            const order = document.querySelector('input[name="effectOrder"]:checked').value;
            const endOp = parseInt($('endOpacity').value) / 100;

            let endPhase = false, endAlpha = 1.0, splitP = 0, flashA = 0;
            let postPhase = false, postP = 0;

            // 타임라인 계산
            if (isEndActive && t > dur) {
                let currentT = t - dur;
                if (order === 'postFirst') {
                    if (currentT < postDur) { postPhase = true; postP = currentT / postDur; }
                    else { postPhase = true; postP = 1; endPhase = true; let et = currentT - postDur; endAlpha = 1 - (ease(Math.min(1, et/500)) * (1-endOp)); if ($('endEffect').value === 'split') splitP = ease(Math.min(1, et/endDur)); if ($('endEffect').value === 'flash_appear') flashA = Math.max(0, 1 - (et/500)); }
                } else {
                    if (currentT < endDur) { endPhase = true; let et = currentT; endAlpha = 1 - (ease(Math.min(1, et/500)) * (1-endOp)); if ($('endEffect').value === 'split') splitP = ease(Math.min(1, et/endDur)); if ($('endEffect').value === 'flash_appear') flashA = Math.max(0, 1 - (et/500)); }
                    else { endPhase = true; endAlpha = endOp; splitP = ($('endEffect').value === 'split')? 1 : 0; let pt = currentT - endDur; postPhase = true; postP = Math.min(1, pt / postDur); }
                }
            } else if (!isEndActive && t > dur) {
                postPhase = true; postP = Math.min(1, (t-dur)/postDur);
            }

            c.clearRect(0, 0, W, H);
            c.imageSmoothingQuality = "high";

            // 이미지 정렬 방향 비율 실시간 산출
            let isHoriz = false;
            if (layers.length > 1) { let hc = 0; layers.forEach(l => { if(l.img && l.img.width*l.scale > l.img.height*l.scale) hc++; }); isHoriz = hc >= (layers.length/2); }

            // 1. 메인 레이어
            layers.forEach(l => {
                let p = Math.min(1, t / dur), pe = ease(p);
                let s = l.scale, w = l.img.width*s, h = l.img.height*s, dx = 0, dy = 0;
                if(l.anim === 'zoomIn') { let ts = 0.7 + pe*0.3; w *= ts; h *= ts; dx = -(w-l.img.width*l.scale)/2; dy = -(h-l.img.height*l.scale)/2; }
                
                let cx = l.x + w/2 + dx, cy = l.y + h/2 + dy;
                if (endPhase && splitP > 0) { if (isHoriz) cy += (cy < H/2) ? -H * splitP : H * splitP; else cx += (cx < W/2) ? -W * splitP : W * splitP; }

                c.save(); c.translate(cx, cy); c.rotate(l.rotation || 0); c.translate(-w/2, -h/2);
                c.globalAlpha = Math.min(p*1.5, 1) * endAlpha;
                if (l.postImg && postPhase) {
                    let pe = ease(postP);
                    if (l.postEffect === 'slide') { c.drawImage(l.img, w*pe, 0, w*(1-pe), h, w*pe, 0, w*(1-pe), h); c.drawImage(l.postImg, 0, 0, w*pe, h, 0, 0, w*pe, h); } 
                    else { c.globalAlpha *= (1-pe); c.drawImage(l.img, 0, 0, w, h); c.globalAlpha = pe * endAlpha; c.drawImage(l.postImg, 0, 0, w, h); }
                } else c.drawImage(l.img, 0, 0, w, h);
                c.restore();

                // 텍스트
                if (l.text) {
                    let b = getTextBounds(l.text, 60, false);
                    c.save(); c.translate(l.textX + w/2 + dx, l.textY + h/2 + dy); c.rotate(l.textRot || 0); c.translate(-b.w/2, -b.h/2);
                    c.font = getFontStr(); c.fillStyle = "#fff";
                    let chars = l.text.split(''), isV = $('gVertical').checked, cx_t = 0, cy_t = 0;
                    chars.forEach((ch, idx) => {
                        let cp = Math.min(Math.max((t - idx*100)/150, 0), 1); c.globalAlpha = cp * endAlpha;
                        if(ch !== ' ') { if($('gStroke').checked) { c.strokeStyle=$('gStrokeHex').value; c.lineWidth=3; c.strokeText(ch, cx_t, cy_t); } c.fillText(ch, cx_t, cy_t); }
                        if (isV) cy_t += (ch === ' ' ? 30 : 65); else cx_t += c.measureText(ch).width;
                    }); c.restore();
                }
            });

            // 2. 독립 레이어
            extraLayers.forEach(el => {
                let b = getExtraLayerBounds(el, c);
                c.save(); c.translate(el.x + b.w/2, el.y + b.h/2); c.rotate(el.rotation || 0); c.translate(-b.w/2, -b.h/2);
                c.globalAlpha = endAlpha;
                if (el.type === 'text') { c.font=`bold ${el.fontSize}px "${$('globalFont').value}"`; c.fillStyle=el.color; c.fillText(el.content, 0, 0); }
                else if (el.img) c.drawImage(el.img, 0, 0, b.w, b.h);
                c.restore();
            });

            // 3. 엔딩 레이어
            if (endPhase) {
                let et = (order === 'postFirst')? t - dur - postDur : t - dur;
                let ep = Math.min(1, et / 500);
                endLayers.forEach(el => {
                    let b = (el.type==='text')? getTextBounds(el.text, el.fontSize, true) : {w: el.img.width*el.scale, h: el.img.height*el.scale};
                    c.save(); c.globalAlpha = ease(ep);
                    let slamS = ($('endEffect').value === 'slam')? 1 + (1-pe)*3 : 1;
                    c.translate(el.x + b.w/2, el.y + b.h/2); c.rotate(el.rotation || 0); c.scale(slamS, slamS); c.translate(-b.w/2, -b.h/2);
                    if (el.type === 'text') {
                        c.font = getEndFontStr(el.fontSize); c.fillStyle = el.colors[0];
                        let chars = el.text.split(''), isV = $('endVertical').checked, cx_e = 0, cy_e = 0;
                        chars.forEach((ch, idx) => {
                            let cp = ($('endTypeSpeed').value==='0')? 1 : Math.min(Math.max((et - idx*100)/150, 0), 1);
                            c.globalAlpha = cp; c.fillText(ch, cx_e, cy_e);
                            if (isV) cy_e += (ch === ' ' ? el.fontSize*0.5 : el.fontSize*1.05); else cx_e += c.measureText(ch).width;
                        });
                    } else if (el.img) c.drawImage(el.img, 0, 0, b.w, b.h);
                    c.restore();
                });
            }
            if (flashA > 0) { c.fillStyle=`rgba(255,255,255,${flashA})`; c.fillRect(0,0,W,H); }
        }

        const draw = () => {
            if (isPlay) return;
            let state = document.querySelector('input[name="previewState"]:checked').value;
            let t = 2000; if (state === 'postMain') t = 3000; if (state === 'ending') t = 5000;
            renderFrame(ctx, t, true);
            
            // 조절 핸들
            if (state === 'ending' && selEnd !== -1) {
                let el = endLayers[selEnd]; let b = (el.type==='text')? getTextBounds(el.text, el.fontSize, true) : {w: el.img.width*el.scale, h: el.img.height*el.scale};
                drawHandle(el.x, el.y, b.w, b.h, el.rotation);
            } else if (selExtra !== -1) {
                let el = extraLayers[selExtra]; let b = getExtraLayerBounds(el, ctx);
                drawHandle(el.x, el.y, b.w, b.h, el.rotation);
            } else if (sel !== -1) {
                let l = layers[sel]; drawHandle(l.x, l.y, l.img.width*l.scale, l.img.height*l.scale, l.rotation);
            }
        };

        function drawHandle(x, y, w, h, angle) {
            ctx.save(); ctx.translate(x+w/2, y+h/2); ctx.rotate(angle || 0); ctx.strokeStyle="#0055FF"; ctx.lineWidth=2; ctx.setLineDash([5,5]); ctx.strokeRect(-w/2, -h/2, w, h);
            ctx.setLineDash([]); ctx.fillStyle="#0055FF"; ctx.fillRect(w/2-7, h/2-7, 14, 14); // resize
            ctx.beginPath(); ctx.arc(0, -h/2-25, 6, 0, Math.PI*2); ctx.fill(); // rotate
            ctx.restore();
        }

        // --- 기능 함수들 ---
        window.resizeCanvas = () => { W = canvasEl.width = parseInt($('canvasW').value); H = canvasEl.height = parseInt($('canvasH').value); draw(); };
        window.addExtraText = () => { extraLayers.push({type:'text', content:'추가 타이포', name:'타이포', fontSize:40, color:'#ffffff', x:W/2-50, y:H/2, rotation:0, scale:1, anim:'fade', animSpeed:1000}); updateExtraUI(); draw(); };
        window.addEndText = () => { endLayers.push({type:'text', text:'전투 발생', name:'엔딩 텍스트', fontSize:120, colors:['#ffffff','#ffffff','#ffffff','#ffffff'], x:W/2-100, y:H/2-50, rotation:0, scale:1}); updateEndUI(); draw(); };

        const updateExtraUI = () => {
            const list = $('extraLayerList'); list.innerHTML = '';
            extraLayers.forEach((el, i) => {
                let div = document.createElement('div'); div.className = `layer-item ${i===selExtra?'active':''}`;
                div.innerHTML = `<span style="font-size:11px;">${el.name}</span> <button class="l-btn del" onclick="extraLayers.splice(${i},1); draw();" style="float:right;">삭제</button>`;
                div.onclick = () => { selExtra = i; sel = -1; selEnd = -1; updateExtraUI(); draw(); };
                list.appendChild(div);
            });
        };

        const updateEndUI = () => {
            const list = $('endLayerList'); list.innerHTML = '';
            endLayers.forEach((el, i) => {
                let div = document.createElement('div'); div.className = `layer-item ${i===selEnd?'active':''}`;
                div.innerHTML = `<span style="font-size:11px;">${el.name}</span> <button class="l-btn del" onclick="endLayers.splice(${i},1); draw();" style="float:right;">삭제</button>`;
                div.onclick = () => { selEnd = i; sel = -1; selExtra = -1; updateEndUI(); draw(); };
                list.appendChild(div);
            });
        };

        // --- 마우스 제어 ---
        canvasEl.onmousedown = e => {
            if (isPlay) return; const {x, y} = getPos(e);
            // 선택된거 핸들 체크 우선
            if (sel !== -1) { let l = layers[sel]; let hit = getTransformHit(x, y, l.x, l.y, l.img.width*l.scale, l.img.height*l.scale, l.rotation); if(hit.isRot){isDrag=true; dragType='rotMain'; return;} if(hit.isRes){isDrag=true; dragType='resMain'; return;} if(hit.isInside){isDrag=true; dragType='moveMain'; offX=x-l.x; offY=y-l.y; return;} }
            if (selExtra !== -1) { let el = extraLayers[selExtra]; let b = getExtraLayerBounds(el, ctx); let hit = getTransformHit(x, y, el.x, el.y, b.w, b.h, el.rotation); if(hit.isRot){isDrag=true; dragType='rotEx'; return;} if(hit.isRes){isDrag=true; dragType='resEx'; return;} if(hit.isInside){isDrag=true; dragType='moveEx'; offX=x-el.x; offY=y-el.y; return;} }
            if (selEnd !== -1) { let el = endLayers[selEnd]; let b = (el.type==='text')?getTextBounds(el.text, el.fontSize, true):{w:el.img.width*el.scale,h:el.img.height*el.scale}; let hit = getTransformHit(x, y, el.x, el.y, b.w, b.h, el.rotation); if(hit.isRot){isDrag=true; dragType='rotEnd'; return;} if(hit.isRes){isDrag=true; dragType='resEnd'; return;} if(hit.isInside){isDrag=true; dragType='moveEnd'; offX=x-el.x; offY=y-el.y; return;} }
            // 새로 선택
            for(let i=layers.length-1; i>=0; i--) { let l=layers[i]; if(getTransformHit(x,y,l.x,l.y,l.img.width*l.scale,l.img.height*l.scale,l.rotation).isInside){sel=i; selExtra=-1; selEnd=-1; updateUI(i); draw(); return;} }
            sel=-1; selExtra=-1; selEnd=-1; draw();
        };
        window.onmousemove = e => {
            if(!isDrag) return; const {x,y} = getPos(e);
            if(dragType==='moveMain'){ layers[sel].x = x-offX; layers[sel].y = y-offY; }
            if(dragType==='resMain'){ layers[sel].scale = (x-layers[sel].x)/layers[sel].img.width; }
            if(dragType==='rotMain'){ layers[sel].rotation = Math.atan2(y-(layers[sel].y+layers[sel].img.height*layers[sel].scale/2), x-(layers[sel].x+layers[sel].img.width*layers[sel].scale/2)) + Math.PI/2; }
            if(dragType==='moveEx'){ extraLayers[selExtra].x = x-offX; extraLayers[selExtra].y = y-offY; }
            if(dragType==='resEx'){ let el = extraLayers[selExtra]; if(el.type==='image') el.scale = (x-el.x)/el.img.width; else el.fontSize = Math.max(10, y-el.y); }
            if(dragType==='moveEnd'){ endLayers[selEnd].x = x-offX; endLayers[selEnd].y = y-offY; }
            draw();
        };
        window.onmouseup = () => { isDrag = false; triggerAutoSave(); };

        // --- 초기 로드 ---
        localDB.init().then(() => localDB.get('ccfolia_cutin_backup')).then(data => { if(data) restoreProjectData(JSON.parse(data)); else resizeCanvas(); });
    </script>
</body>
</html>
